<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- No background tile — transparent, matching Michi's icon (the browser
       tab/OS/home-screen surface shows through, same as every other
       household app icon). -->
  <!-- Classic video-camera glyph, matching the household's reference:
       a small circle (left) + larger circle (right) resting tangent ON the
       body's top edge (not sunk into it), a rectangular body, and a
       triangular lens flag on the RIGHT side, its point touching the body
       and flaring out to a wide end away from it. Drawn as line-art outline
       (Michi torii technique) so the solid crimson cat badge stays legible
       inside the open paper-white body. -->
  <circle cx="8.75" cy="11.6" r="2.8" fill="none" stroke="#c33c54" stroke-width="2" />
  <circle cx="17.4" cy="10" r="4.4" fill="none" stroke="#c33c54" stroke-width="2" />
  <rect x="4.85" y="14.4" width="18" height="12" rx="1" fill="none" stroke="#c33c54" stroke-width="2" />
  <path d="M22.85,20.4 L26.1,17.4 L26.1,23.4 Z" fill="none" stroke="#c33c54" stroke-width="2" stroke-linejoin="round" />
  <!-- The household cat mark, centered in the body -->
  <g transform="translate(8.41,15.73) scale(0.34)">
    <path
      d="M4,9 L2,1.5 L10,7.5 Q16,4 22,7.5 L30,1.5 L28,9 Q30.5,14.5 28,20 Q24.5,26 16,26 Q7.5,26 4,20 Q1.5,14.5 4,9 Z"
      fill="#c33c54"
    />
    <circle cx="12" cy="16.5" r="1.6" fill="#f7fbfa" />
    <circle cx="20" cy="16.5" r="1.6" fill="#f7fbfa" />
    <path d="M15,20 L17,20 L16,21.3 Z" fill="#f7fbfa" />
  </g>
</svg>
