<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <rect width="32" height="32" rx="6" fill="#f7fbfa" />
  <!-- Classic video-camera glyph: small + large viewfinder circles sitting
       right on top of the body (touching, not buried inside it like the
       first attempt), a rectangular body, and a triangular lens flag on the
       front — drawn as a line-art outline (not solid fill), same technique
       as Michi's torii gate, so the solid cat badge below reads clearly
       against the open paper-white interior instead of disappearing into a
       same-color solid body. -->
  <circle cx="11" cy="10" r="3" fill="none" stroke="#c33c54" stroke-width="2.2" />
  <circle cx="18.5" cy="9" r="4.5" fill="none" stroke="#c33c54" stroke-width="2.2" />
  <rect x="7" y="13" width="17" height="11" rx="1" fill="none" stroke="#c33c54" stroke-width="2.2" />
  <path d="M7,16.5 L7,20.5 L2.5,18.5 Z" fill="none" stroke="#c33c54" stroke-width="2.2" stroke-linejoin="round" />
  <!-- The household cat, centered in the body -->
  <g transform="translate(10,13.8) scale(0.345)">
    <path
      d="M4,9 L2,1.5 L10,7.5 Q16,4 22,7.5 L30,1.5 L28,9 Q30.5,14.5 28,20 Q24.5,26 16,26 Q7.5,26 4,20 Q1.5,14.5 4,9 Z"
      fill="#c33c54"
    />
    <circle cx="12" cy="16.5" r="1.6" fill="#f7fbfa" />
    <circle cx="20" cy="16.5" r="1.6" fill="#f7fbfa" />
    <path d="M15,20 L17,20 L16,21.3 Z" fill="#f7fbfa" />
  </g>
</svg>
