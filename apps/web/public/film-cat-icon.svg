<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <rect width="32" height="32" rx="6" fill="#f7fbfa" />
  <!-- Old film camera, side profile: two top film reels, a boxy body, a
       front lens — drawn as a line-art outline (not solid fill), same
       technique as Michi's torii gate, so the solid cat badge below reads
       clearly against the open paper-white interior instead of disappearing
       into a same-color solid body. Reels sit just above the body (barely
       touching, not overlapping it) and the lens sits low on the body's
       right edge, clear of the second reel, so the silhouette stays
       readable at favicon size. -->
  <circle cx="10" cy="9" r="3.4" fill="none" stroke="#c33c54" stroke-width="2.4" />
  <circle cx="20" cy="9" r="3.4" fill="none" stroke="#c33c54" stroke-width="2.4" />
  <rect x="6" y="13" width="18" height="11" rx="1.5" fill="none" stroke="#c33c54" stroke-width="2.4" />
  <circle cx="25.5" cy="21.5" r="2.6" fill="none" stroke="#c33c54" stroke-width="2.4" />
  <!-- The household cat, badge-sized, low on the camera's body — same path
       as the original standalone cat-icon.svg. -->
  <g transform="translate(8.6,15.6) scale(0.27)">
    <path
      d="M4,9 L2,1.5 L10,7.5 Q16,4 22,7.5 L30,1.5 L28,9 Q30.5,14.5 28,20 Q24.5,26 16,26 Q7.5,26 4,20 Q1.5,14.5 4,9 Z"
      fill="#c33c54"
    />
    <circle cx="12" cy="16.5" r="1.6" fill="#f7fbfa" />
    <circle cx="20" cy="16.5" r="1.6" fill="#f7fbfa" />
    <path d="M15,20 L17,20 L16,21.3 Z" fill="#f7fbfa" />
  </g>
</svg>
