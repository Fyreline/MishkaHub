<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="film-cat-icon.svg" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#faf9f5" />
    <!-- "Add to Home Screen" from Safari on iOS: with these three, the site
         opens full-screen (no Safari chrome) under its own icon/title —
         there's no Apple developer account or App Store step involved,
         this is just what Safari/iOS honor for any bookmarked site. Same
         pattern as Michi and Japan 2026's index.html. -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Mishka Hub" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@500;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <title>Mishka Hub</title>
    <script>
      // Apply the theme class before first paint to avoid a flash of the
      // wrong theme. Mirrors the logic in src/components/ThemeToggle.tsx:
      // explicit localStorage choice wins, otherwise fall back to the OS
      // `prefers-color-scheme` on first visit.
      (function () {
        try {
          var stored = localStorage.getItem('mishka-theme');
          var dark = stored ? stored === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches;
          document.documentElement.classList.toggle('dark', dark);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
